<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebStatus Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="header">
    <span class="header-title">WebStatus</span>
    <div class="header-right">
      <span class="muted" id="nextCheck">Loading…</span>
      <form method="POST" action="logout" style="display:inline">
        <button class="btn-logout" type="submit">Sign out</button>
      </form>
    </div>
  </header>

  <!-- ── Main content ────────────────────────────────────────────────────── -->
  <main class="main">

    <div id="statusBanner" class="status-banner pending">Checking…</div>

    <p class="section-heading">Websites</p>
    <div id="sitesGrid" class="sites-grid">
      <div class="spinner"></div>
    </div>

    <p class="section-heading" id="serversHeading" style="display:none">Servers</p>
    <div id="serverCards"></div>

  </main>

  <footer class="footer" id="footer"></footer>

  <script>
  // ── Helpers ────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    const secs = Math.round((Date.now() - new Date(iso)) / 1000);
    if (secs < 5)   return 'just now';
    if (secs < 60)  return `${secs}s ago`;
    if (secs < 120) return '1 min ago';
    return `${Math.floor(secs / 60)} mins ago`;
  }

  function fmtMs(ms) {
    if (ms == null) return '—';
    if (ms >= 1000) return `${(ms / 1000).toFixed(1)}s`;
    return `${ms}ms`;
  }

  function fmtMB(mb) {
    if (mb == null) return '—';
    if (mb >= 1024) return `${(mb / 1024).toFixed(1)} GB`;
    return `${mb} MB`;
  }

  function barClass(pct) {
    if (pct >= 85) return 'crit';
    if (pct >= 65) return 'warn';
    return 'ok';
  }

  function stateBadge(state) {
    const labels = { up: 'Up', down: 'Down', warn: 'Bad Status', slow: 'Slow', pending: 'Checking…' };
    return `<span class="state-badge ${esc(state)}">${labels[state] ?? esc(state)}</span>`;
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function renderSites(sites) {
    if (!sites || !sites.length) {
      document.getElementById('sitesGrid').innerHTML = '<p style="color:var(--muted)">No sites configured.</p>';
      return;
    }

    const html = sites.map((s) => {
      const stateClass = `state-${s.state ?? 'pending'}`;
      const errorHtml = s.error
        ? `<div class="card-error">${esc(s.error)}</div>`
        : '';

      return `
        <div class="site-card ${stateClass}">
          <div class="card-top">
            <span class="card-name">${esc(s.name)}</span>
            ${stateBadge(s.state ?? 'pending')}
          </div>
          <div class="card-url"><a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">${esc(s.url)}</a></div>
          <div class="card-meta">
            <span>Status <strong>${s.statusCode != null ? s.statusCode : '—'}</strong></span>
            <span>Response <strong>${fmtMs(s.responseTimeMs)}</strong></span>
            <span>Checked <strong>${timeAgo(s.checkedAt)}</strong></span>
          </div>
          ${errorHtml}
        </div>`;
    }).join('');

    document.getElementById('sitesGrid').innerHTML = html;
  }

  function renderServerRow(s) {
    if (s.state === 'down' || s.state === 'pending') {
      return `
        <div class="server-row">
          <span class="server-row-label">${esc(s.label)}</span>
          <span class="server-row-error" colspan="3">${s.state === 'pending' ? 'Checking…' : esc(s.error ?? 'Unreachable')}</span>
        </div>`;
    }
    const cpuPct = s.cpuPercent ?? 0;
    const ramPct = s.totalMemoryMB ? Math.round((s.usedMemoryMB / s.totalMemoryMB) * 100) : 0;
    return `
      <div class="server-row">
        <span class="server-row-label">${esc(s.label)}</span>
        <div class="server-row-metric">
          <div class="bar-track"><div class="bar-fill ${barClass(cpuPct)}" style="width:${cpuPct}%"></div></div>
          <span class="row-metric-text">${cpuPct}%</span>
        </div>
        <div class="server-row-metric">
          <div class="bar-track"><div class="bar-fill ${barClass(ramPct)}" style="width:${ramPct}%"></div></div>
          <span class="row-metric-text">${fmtMB(s.usedMemoryMB)} / ${fmtMB(s.totalMemoryMB)}</span>
        </div>
        <span class="server-row-sessions">
          <span class="sess-active">${s.activeSessions ?? '—'}</span> active
          &nbsp;·&nbsp;
          <span class="sess-disc">${s.disconnectedSessions ?? '—'}</span> disc
        </span>
      </div>`;
  }

  function renderServerCard(group) {
    const checkedAt = group.servers.map((s) => s.checkedAt).filter(Boolean).sort().pop();
    return `
      <div class="server-card">
        <div class="server-header">
          <div>
            <div class="server-name">${esc(group.displayName)}</div>
            <div class="server-hostname">checked ${timeAgo(checkedAt)}</div>
          </div>
          ${stateBadge(group.state ?? 'pending')}
        </div>
        <div class="server-row-header">
          <span></span>
          <span>CPU</span>
          <span>RAM</span>
          <span>RDP Sessions</span>
        </div>
        <div class="server-rows">
          ${group.servers.map(renderServerRow).join('')}
        </div>
      </div>`;
  }

  function renderServers(rdpServers) {
    const heading = document.getElementById('serversHeading');
    const container = document.getElementById('serverCards');

    if (!rdpServers || rdpServers.length === 0) {
      heading.style.display = 'none';
      container.innerHTML = '';
      return;
    }

    const allPending = rdpServers.every((g) =>
      g.servers.every((s) => s.state === 'pending' && !s.checkedAt)
    );
    if (allPending) {
      heading.style.display = 'none';
      container.innerHTML = '';
      return;
    }

    heading.style.display = '';
    container.innerHTML = rdpServers.map(renderServerCard).join('');
  }

  function renderBanner(sites) {
    const banner = document.getElementById('statusBanner');
    if (!sites || sites.every((s) => s.state === 'pending')) {
      banner.className = 'status-banner pending';
      banner.textContent = 'Running initial checks…';
      return;
    }
    const down  = sites.filter((s) => s.state === 'down').length;
    const warn  = sites.filter((s) => s.state === 'warn' || s.state === 'slow').length;
    const total = sites.length;
    if (down > 0) {
      banner.className = 'status-banner has-issues';
      banner.textContent = `⚠ ${down} of ${total} site${down !== 1 ? 's' : ''} down`;
    } else if (warn > 0) {
      banner.className = 'status-banner has-warnings';
      banner.textContent = `${warn} site${warn !== 1 ? 's' : ''} reporting warnings`;
    } else {
      banner.className = 'status-banner all-ok';
      banner.textContent = `All ${total} site${total !== 1 ? 's' : ''} operational`;
    }
  }

  // ── Polling ────────────────────────────────────────────────────────────────

  let nextCheckAt = null;
  let checkIntervalSeconds = 60;

  async function poll() {
    try {
      const res = await fetch('api/status');
      if (res.status === 401) { window.location.href = './'; return; }
      if (!res.ok) return;
      const data = await res.json();

      renderBanner(data.sites);
      renderSites(data.sites);
      renderServers(data.rdpServers);

      nextCheckAt = data.nextCheckAt ? new Date(data.nextCheckAt) : null;
      checkIntervalSeconds = data.checkIntervalSeconds || 60;

      document.getElementById('footer').textContent =
        `Last fetched: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error('Poll failed:', err);
    }
  }

  function updateCountdown() {
    const el = document.getElementById('nextCheck');
    if (!nextCheckAt) { el.textContent = ''; return; }
    const secs = Math.max(0, Math.round((nextCheckAt - Date.now()) / 1000));
    if (secs === 0) {
      el.textContent = 'Checking…';
    } else {
      el.textContent = `Next check in ${secs}s`;
    }
  }

  // Poll API every 15 seconds (more frequent than server check interval so UI stays fresh)
  setInterval(poll, 15000);
  setInterval(updateCountdown, 1000);

  poll(); // Initial fetch on page load
  </script>
</body>
</html>
